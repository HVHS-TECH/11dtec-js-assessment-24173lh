<!DOCTYPE html>
<html>
<head>
<title>The Wellness Kitchen</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" href="images/logo.png" type="image/x-icon">
</head>
<body>

<div class="container-nav">
<div id="logo"><a href="index.html"><img src="images/logo.png" width="100"></a></div>
<div id="name"><h1>The Wellness Kitchen</h1></div>
<div id="shopping"><a href="order.html"><img src="images/shopping.png" width="100"></a></div>
</div>

<div class="container-order">
<div id="order"><h1>Order:</h1>
<div id="JavaScriptOutput">
</div>
<br>
<button onclick="clearOrder()">Clear Order</button>
</div>

</div>
<div id="details">
<h1>Details:</h1>
<form onsubmit="return false;">
  <label for="userName">Full Name:</label>
  <input type="string" id="nameField" name="userName" placeholder="Name">
  <br>
  <br>
  <label for="userMoney">Bank Account Balance:</label>
  <input type="number" id="moneyField" name="userMoney" placeholder="Money">
  <br>
  <br>
  <input type="submit" value="Complete Order" onClick=getFormInput();>
  </form>

  <div id="Details"></div>

</div>

</div>


  
<script src="order.js"></script>
</body>
</html>
